  <!-- Sub text -->
  <text x="600" y="430" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#FFFFFF" text-anchor="middle" opacity="0.6">SEO / MEO / Web広告 — 月3万円〜</text>

  <!-- URL -->
  <text x="600" y="560" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#FF5A1F" text-anchor="middle" opacity="0.8">accellink.github.io</text>
